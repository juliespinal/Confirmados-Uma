<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 15 - Invitados</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="./assets/css/styles.css" rel="stylesheet" type="text/css">
</head>

<body>

    <div class="hero">
        <div class="profile-pic"></div>
        <h1>Mis 15</h1>
        <p style="color:#E5E5EA;">Invitados confirmados</p>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-box">
                <h3 id="total-guests">0</h3>
                <p>Invitados</p>
            </div>
            <div class="stat-box">
                <h3 id="total-attending">0</h3>
                <p>Asisten</p>
            </div>
        </div>

        <div id="guest-list">
            <div class="loader">Actualizando lista en vivo... ✨</div>
        </div>
    </div>
    
    <div id="overlay" class="overlay" onclick="closeSheet()"></div>

    <div id="bottom-sheet" class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div id="sheet-content">
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx47HzGEsN1f-DbMycItV6Nf0PtZ3T6iFEoO9rxrQPgZDeXq9nr_Gh_E4aMUNKDDTN31g/exec';
        let globalGuests = [];

        async function fetchGuests() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                globalGuests = data.reverse();
                renderGuests(globalGuests);
            } catch (error) {
                console.error("Error cargando los datos:", error);
            }
        }

        function renderGuests(guests) {
            const list = document.getElementById('guest-list');
            if (!list) return; // Seguridad extra
            list.innerHTML = '';

            let totalAsisten = 0;

            guests.forEach((guest, index) => {
                if (!guest.nombre) return;

                // Lectura segura: previene errores si la celda en Sheets está vacía
                const asisteStr = String(guest.asiste || '').toLowerCase().trim();
                const asiste = (asisteStr === 'sí asisto' || asisteStr === 'si asisto');

                const acompanadoStr = String(guest.acompanado || '').toLowerCase().trim();
                const vieneAcompanado = (asiste && (acompanadoStr === 'sí' || acompanadoStr === 'si'));

                if (asiste) totalAsisten++;

                const initial = String(guest.nombre).charAt(0).toUpperCase();
                const hue = initial.charCodeAt(0) * 15 % 360;

                let cardHTML = `
                    <div class="card" onclick="openSheet(${index})">
                        <div class="avatar" style="background: hsl(${hue}, 80%, 70%);">${initial}</div>
                        <div class="info">
                            <div class="name">${guest.nombre}</div>
                            <div class="status">
                                <span class="dot ${asiste ? 'yes' : 'no'}"></span>
                                ${asiste ? 'Confirmado' : 'No asiste'} 
                `;

                if (asiste) {
                    if (vieneAcompanado) {
                        cardHTML += ` · Acompañado <span class="tap-text">(tocar para ver)</span>`;
                    } else {
                        cardHTML += ` · Solo/a`;
                    }
                }

                cardHTML += `</div>`; // Cerramos el div de status

                // Lectura segura de comentarios
                const comentariosStr = String(guest.comentarios || '').trim();
                if (comentariosStr !== "") {
                    cardHTML += `<div class="comment">"${comentariosStr}"</div>`;
                }

                cardHTML += `</div></div>`; // Cerramos info y card
                list.innerHTML += cardHTML;
            });

            const totalGuestsEl = document.getElementById('total-guests');
            const totalAttendingEl = document.getElementById('total-attending');
            if (totalGuestsEl) totalGuestsEl.innerText = guests.length;
            if (totalAttendingEl) totalAttendingEl.innerText = totalAsisten;
        }

        function openSheet(index) {
            const guest = globalGuests[index];
            const content = document.getElementById('sheet-content');
            if (!content) return;

            // Lectura segura para el panel
            const asisteStr = String(guest.asiste || '').toLowerCase().trim();
            const asiste = (asisteStr === 'sí asisto' || asisteStr === 'si asisto');

            const acompanadoStr = String(guest.acompanado || '').toLowerCase().trim();
            const vieneAcompanado = (asiste && (acompanadoStr === 'sí' || acompanadoStr === 'si'));

            let html = `
                <div class="detail-group">
                    <div class="detail-label">Nombre del Invitado</div>
                    <div class="detail-value">${guest.nombre}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label">Estado</div>
                    <div class="detail-value" style="color: ${asiste ? 'var(--success)' : 'var(--danger)'}">
                        ${asiste ? '✔️ Confirmó Asistencia' : '❌ No asiste'}
                    </div>
                </div>
            `;

            if (asiste) {
                html += `
                    <div class="detail-group">
                        <div class="detail-label">¿Viene acompañado?</div>
                        <div class="detail-value">${vieneAcompanado ? 'Sí' : 'No'}</div>
                    </div>
                `;

                const nombresAcompanantes = String(guest.nombres_acompanantes || '').trim();
                if (vieneAcompanado && nombresAcompanantes !== "" && nombresAcompanantes !== "-") {
                    html += `
                        <div class="detail-group">
                            <div class="detail-label">Nombre de los acompañantes</div>
                            <div class="detail-value">👥 ${nombresAcompanantes}</div>
                        </div>
                    `;
                }
            }

            const comentariosStr = String(guest.comentarios || '').trim();
            if (comentariosStr !== "") {
                html += `
                    <div class="detail-group">
                        <div class="detail-label">Comentarios / Mensaje</div>
                        <div class="detail-value">💬 "${comentariosStr}"</div>
                    </div>
                `;
            }

            content.innerHTML = html;

            // Activamos el panel y bloqueamos el scroll del fondo
            const sheet = document.getElementById('bottom-sheet');
            const overlay = document.getElementById('overlay');
            if (sheet && overlay) {
                sheet.classList.add('active');
                sheet.style.transform = ''; // Reseteamos transform por si venía de un arrastre
                overlay.classList.add('active');
                document.body.classList.add('no-scroll');
            }
        }

        function closeSheet() {
            const sheet = document.getElementById('bottom-sheet');
            const overlay = document.getElementById('overlay');
            if (sheet && overlay) {
                sheet.classList.remove('active');
                sheet.style.transform = ''; // Reseteamos transform
                overlay.classList.remove('active');
                document.body.classList.remove('no-scroll');
            }
        }

        // --- LÓGICA DE DESLIZAR PARA CERRAR (SWIPE DOWN) ---
        const bottomSheet = document.getElementById('bottom-sheet');

        if (bottomSheet) {
            let startY = 0;
            let currentY = 0;
            let isDragging = false;

            bottomSheet.addEventListener('touchstart', (e) => {
                // Obtenemos la posición exacta del toque
                startY = e.touches[0].clientY;
                currentY = startY;
                isDragging = true;

                // Agregamos clase para quitar la transición (evita lag)
                bottomSheet.classList.add('dragging');

                // OPCIONAL: Si querés un efecto visual al tocar, podés agregarlo acá
            }, { passive: true }); // passive: true mejora performance al inicio

            bottomSheet.addEventListener('touchmove', (e) => {
                if (!isDragging) return;

                currentY = e.touches[0].clientY;
                let deltaY = currentY - startY;

                // CLAVE: Solo permitimos deslizar hacia abajo (deltaY positivo)
                if (deltaY > 0) {
                    // !!! ESTA ES LA LÍNEA MÁGICA !!!
                    // Evita que el navegador intente hacer scroll normal del texto
                    if (e.cancelable) e.preventDefault();

                    // Movemos la card siguiendo el dedo
                    bottomSheet.style.transform = `translateY(${deltaY}px)`;
                }
            }, { passive: false }); // passive: false es OBLIGATORIO para usar preventDefault()

            bottomSheet.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;

                // Volvemos a habilitar las transiciones suaves
                bottomSheet.classList.remove('dragging');

                let deltaY = currentY - startY;

                // Si deslizó lo suficiente (más de 100px para evitar cierres accidentales), cerramos
                if (deltaY > 100) {
                    closeSheet();
                } else {
                    // Si deslizó poquito, efecto rebote y vuelve a posición original
                    bottomSheet.style.transform = '';
                }

                // Reseteamos valores
                startY = 0;
                currentY = 0;
            });
        }

        fetchGuests();
        // Mantenemos la actualización cada 10 segs
        setInterval(fetchGuests, 10000);
    </script>

</body>

</html>
